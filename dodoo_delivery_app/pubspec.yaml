name: dodoo_delivery_app
description: "DoDoo Rider — delivery partner app with OTP auth and order management."
publish_to: 'none'

version: 1.2.1+4

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.0

  # State management
  riverpod: ^2.3.0
  flutter_riverpod: ^2.3.0

  # Maps & location
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2

  # Auth & storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.3

  # Firebase (backend)
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1

  # Image handling
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.4

  # Notifications
  flutter_local_notifications: ^18.0.0
  # In-app alert sound (plays when a new order arrives while the app is open)
  audioplayers: ^6.1.0

  # Utilities
  crypto: ^3.0.0
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon. Uses the mascot logo. To change the app icon, replace
# assets/images/dodoo_logo.png (ideally a 1024x1024 square) and run:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/dodoo_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F6F7E8"
  adaptive_icon_foreground: "assets/images/dodoo_logo.png"
  web:
    generate: true
    image_path: "assets/images/dodoo_logo.png"
    background_color: "#F6F7E8"
    theme_color: "#BABC2F"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
